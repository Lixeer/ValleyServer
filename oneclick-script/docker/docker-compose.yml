version: "3.8"

services:
  stardew:
    image: valley-server
    container_name: stardew_server
    restart: unless-stopped

    volumes:
      - ./Mods:/content/Stardew Valley/Mods
      - ./Saves:/root/.config/StardewValley/Saves

    ports:
      - "24642:24642/udp"
      - "5800:5800"
      - "5900:5900"
      - "29103:29103"